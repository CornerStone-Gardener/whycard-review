<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<title>ODINA Pool Browse</title>
<style>
body{font-family:sans-serif;background:#f4f4f4;margin:0;padding:0}
#header{background:#1a1a2e;color:#fff;padding:12px 20px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
#header h1{margin:0;font-size:16px;font-weight:700}
#progress{font-size:13px;color:#aaa;flex:1}
#resume-btn{background:#e8a030;color:#fff;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;display:none}
#batch-info{background:#fff;border-bottom:1px solid #ddd;padding:10px 20px;font-size:13px;color:#555;display:flex;gap:20px;align-items:center}
#batch-info span{font-weight:700;color:#1a1a2e}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;padding:16px 20px}
.card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.12);position:relative}
.card img{width:100%;height:180px;object-fit:cover;display:block;background:#eee}
.card-body{padding:8px}
.card-id{font-size:10px;color:#999;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:6px}
.btns{display:flex;gap:6px}
.btn-pick{flex:1;background:#2e7d32;color:#fff;border:none;padding:8px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700}
.btn-skip{flex:1;background:#fff;color:#888;border:1.5px dashed #ccc;padding:8px;border-radius:8px;cursor:pointer;font-size:12px}
.btn-pick:hover{background:#1b5e20}
.btn-skip:hover{background:#f5f5f5}
.card.picked{outline:3px solid #2e7d32}
.card.skipped{opacity:.45}
.picked-badge{position:absolute;top:8px;right:8px;background:#2e7d32;color:#fff;font-size:11px;font-weight:700;padding:3px 7px;border-radius:20px}
#footer{background:#fff;border-top:2px solid #1a1a2e;padding:16px 20px;display:flex;align-items:center;gap:16px;position:sticky;bottom:0}
#next-btn{margin-left:auto;background:#1a1a2e;color:#fff;border:none;padding:12px 28px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:700}
#next-btn:disabled{background:#aaa;cursor:default}
#done-screen{display:none;text-align:center;padding:60px 20px}
#notice{background:#fff3cd;border:1px solid #ffc107;padding:10px 16px;margin:12px 20px;border-radius:8px;font-size:13px;color:#856404;display:none}
</style>
</head>
<body>
<div id="header">
  <h1 id="h-title">ODINA Pool Browse</h1>
  <div id="progress">Loading...</div>
  <button id="resume-btn" onclick="resumeSession()">Resume</button>
</div>
<div id="batch-info">
  Batch <span id="batch-num">-</span> / <span id="batch-total">-</span>
  &nbsp;|&nbsp; Images <span id="img-range">-</span>
  &nbsp;|&nbsp; Selected: <span id="picked-count">0</span>
</div>
<div id="notice"></div>
<div id="grid"></div>
<div id="footer">
  <div style="font-size:13px;color:#555">
    Selected: <b id="f-picked" style="color:#2e7d32">0</b>
    &nbsp;/ Skipped: <b id="f-skipped">0</b>
    &nbsp;/ Pending: <b id="f-pending">100</b>
  </div>
  <button id="next-btn" onclick="completeBatch()" disabled>Save &amp; Next 100 &#9654;</button>
</div>
<div id="done-screen">
  <h2>Complete!</h2>
  <p>Total selected: <b id="total-picked"></b></p>
  <button onclick="exportResults()" style="background:#e8a030;color:#fff;border:none;padding:14px 32px;border-radius:10px;cursor:pointer;font-size:15px;font-weight:700;margin-top:16px">Download JSON</button>
</div>
<script>
// Korean labels via JS to avoid encoding issues
var L = {
  title: '이미지 풍 탐색',
  loading: '로딩 중...',
  resume: '⏸ {n}번째부터 이어하기',
  batch: '배치',
  images: '이미지',
  selected: '후보 선택',
  pick: '✅ 후보',
  skip: '건너뛰기',
  saveNext: '저장 완료 → 다음 100장 ▶',
  notice: '⚠ 이번 배치 후보가 {n}장 이상입니다. 부스트 기준 재검토 필요할 수 있습니다.',
  done: '전체 탐색 완료!',
  totalPicked: '전체 후보',
  pending: '미결',
  skipped: '건너뛰',
  failLoad: 'pool_manifest.json 로드 실패: '
};

var BATCH_SIZE = 100;
var AS_URL = 'https://script.google.com/macros/s/AKfycbzAAlGIpLxqjlrQ9tQMy-HO2Z9EKjMJNph5zP_Gohw49Yl1a2-QWo6BhFy8in6pKqcV/exec';
var STORAGE_KEY = 'odina_pool_browse_v1';
var POOL = [];
var state = { batchIndex: 0, results: {}, completedBatches: [] };

function setText(id, text) { document.getElementById(id).textContent = text; }

async function init() {
  document.getElementById('h-title').textContent = L.title;
  setText('progress', L.loading);

  var saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try { state = JSON.parse(saved); } catch(e) {}
    if (state.batchIndex > 0) {
      var btn = document.getElementById('resume-btn');
      btn.style.display = 'inline-block';
      btn.textContent = L.resume.replace('{n}', state.batchIndex * BATCH_SIZE);
    }
  }

  try {
    var resp = await fetch('pool_manifest.json');
    POOL = await resp.json();
  } catch(e) {
    setText('progress', L.failLoad + e);
    return;
  }

  renderBatch();
}

function resumeSession() { renderBatch(); }

function getBatch() {
  return POOL.slice(state.batchIndex * BATCH_SIZE, (state.batchIndex + 1) * BATCH_SIZE);
}

function renderBatch() {
  var batch = getBatch();
  var batchNum = state.batchIndex + 1;
  var batchTotal = Math.ceil(POOL.length / BATCH_SIZE);
  var start = state.batchIndex * BATCH_SIZE + 1;
  var end = Math.min(start + BATCH_SIZE - 1, POOL.length);

  setText('batch-num', batchNum);
  setText('batch-total', batchTotal);
  setText('img-range', start + '~' + end);
  setText('progress', batchNum + '/' + batchTotal + ' | ' + POOL.length + '장');

  var grid = document.getElementById('grid');
  grid.innerHTML = '';

  batch.forEach(function(img) {
    var verdict = state.results[img.id];
    var card = document.createElement('div');
    card.className = 'card' + (verdict === 'pick' ? ' picked' : verdict === 'skip' ? ' skipped' : '');
    card.id = 'c-' + img.id;

    var el = document.createElement('div');
    el.innerHTML = (verdict === 'pick' ? '<div class="picked-badge">' + L.pick + '</div>' : '') +
      '<img src="' + img.url + '" alt="" loading="lazy">' +
      '<div class="card-body"><div class="card-id">' + img.id + '</div><div class="btns">' +
      '<button class="btn-pick">'+L.pick+'</button>' +
      '<button class="btn-skip">'+L.skip+'</button>' +
      '</div></div>';

    el.querySelectorAll('.btn-pick')[0].onclick = (function(id){ return function(){ pick(id); }; })(img.id);
    el.querySelectorAll('.btn-skip')[0].onclick = (function(id){ return function(){ skip(id); }; })(img.id);

    while (el.firstChild) card.appendChild(el.firstChild);
    grid.appendChild(card);
  });

  updateFooter();
}

function pick(id) {
  state.results[id] = 'pick';
  saveState();
  var card = document.getElementById('c-' + id);
  card.className = 'card picked';
  if (!card.querySelector('.picked-badge')) {
    var b = document.createElement('div');
    b.className = 'picked-badge';
    b.textContent = L.pick;
    card.insertBefore(b, card.firstChild);
  }
  updateFooter();
  checkNotice();
}

function skip(id) {
  state.results[id] = 'skip';
  saveState();
  document.getElementById('c-' + id).className = 'card skipped';
  updateFooter();
}

function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

function updateFooter() {
  var batch = getBatch();
  var picked = 0, skipped = 0, pending = 0;
  batch.forEach(function(img) {
    var v = state.results[img.id];
    if (v === 'pick') picked++;
    else if (v === 'skip') skipped++;
    else pending++;
  });
  setText('f-picked', picked);
  setText('f-skipped', skipped);
  setText('f-pending', pending);

  var total = Object.values(state.results).filter(function(v){ return v === 'pick'; }).length;
  setText('picked-count', total);

  var btn = document.getElementById('next-btn');
  btn.disabled = (pending > 0);
  if (pending === 0) {
    btn.textContent = L.saveNext + (picked > 0 ? ' (' + L.pick + ' ' + picked + ')' : '');
  }
}

function checkNotice() {
  var batch = getBatch();
  var picked = batch.filter(function(img){ return state.results[img.id] === 'pick'; }).length;
  var notice = document.getElementById('notice');
  if (picked > 30) {
    notice.style.display = 'block';
    notice.textContent = L.notice.replace('{n}', picked);
  } else {
    notice.style.display = 'none';
  }
}

async function completeBatch() {
  var batch = getBatch();
  var batchResults = batch.map(function(img){ return { id: img.id, verdict: state.results[img.id] }; });
  state.completedBatches.push({ batchIndex: state.batchIndex, ts: new Date().toISOString(), results: batchResults });

  try {
    await fetch(AS_URL, {
      method: 'POST',
      body: JSON.stringify({ type: 'pool_batch', batchIndex: state.batchIndex, ts: new Date().toISOString(), results: batchResults })
    });
  } catch(e) { console.warn('AS POST fail:', e); }

  state.batchIndex++;
  saveState();

  if (state.batchIndex * BATCH_SIZE >= POOL.length) {
    document.getElementById('grid').style.display = 'none';
    document.getElementById('footer').style.display = 'none';
    document.getElementById('batch-info').style.display = 'none';
    var ds = document.getElementById('done-screen');
    ds.style.display = 'block';
    ds.querySelector('h2').textContent = L.done;
    var total = Object.values(state.results).filter(function(v){ return v === 'pick'; }).length;
    setText('total-picked', total);
  } else {
    window.scrollTo(0, 0);
    renderBatch();
  }
}

function exportResults() {
  var picked = Object.entries(state.results).filter(function(e){ return e[1]==='pick'; }).map(function(e){ return e[0]; });
  var blob = new Blob([JSON.stringify({ exported_at: new Date().toISOString(), total_reviewed: Object.keys(state.results).length, total_picked: picked.length, picked_ids: picked }, null, 2)], {type: 'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'pool_picks_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}

init();
</script>
</body>
</html>
